<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" role="img" aria-labelledby="title desc">
  <title id="title">SharpOdinClient</title>
  <desc id="desc">C# Samsung Odin Protocol Library</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="45%" stop-color="#252830"/>
      <stop offset="100%" stop-color="#1e2229"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>

    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <rect x="0" y="0" width="1280" height="120" fill="url(#glow)"/>

  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <g stroke="#4a9eff" stroke-opacity="0.25" stroke-width="1.5" fill="none">
    <path d="M 80 320 L 80 200 L 140 200 L 140 160"/>
    <path d="M 120 280 L 180 280 L 180 240"/>
    <circle cx="80" cy="320" r="4" fill="#4a9eff" fill-opacity="0.5" stroke="none"/>
    <circle cx="140" cy="160" r="3" fill="#7c5cff" fill-opacity="0.6" stroke="none"/>
  </g>

  <g transform="translate(100,130)" filter="url(#soft)">
    <rect x="0" y="0" width="56" height="96" rx="8" fill="none" stroke="#e8eaed" stroke-width="2.5"/>
    <rect x="8" y="12" width="40" height="64" rx="2" fill="#e8eaed" fill-opacity="0.08"/>
    <circle cx="28" cy="82" r="4" fill="#e8eaed" fill-opacity="0.4"/>

    <path d="M 72 48 L 110 48" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <rect x="108" y="40" width="14" height="16" rx="3" fill="url(#accent)" fill-opacity="0.9"/>
    <path d="M 122 48 L 150 48" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <text x="200" y="175"
        font-family="Segoe UI, system-ui, -apple-system, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#f4f5f7">
    SharpOdinClient
  </text>

  <text x="200" y="215"
        font-family="Segoe UI, system-ui, sans-serif"
        font-size="22"
        font-weight="400"
        fill="#9aa0a8">
    C# .NET library for Samsung download mode
  </text>

  <text x="200" y="255"
        font-family="Segoe UI, system-ui, sans-serif"
        font-size="16"
        fill="#6b7280">
    ODIN / LOKE protocol &#183; Flash tar &#183; lz4 &#183; img &#183; Read / Write PIT
  </text>

  <rect x="200" y="278"
        width="220"
        height="32"
        rx="6"
        fill="#4a9eff"
        fill-opacity="0.12"
        stroke="#4a9eff"
        stroke-opacity="0.4"
        stroke-width="1"/>

  <text x="215" y="299"
        font-family="Segoe UI, system-ui, sans-serif"
        font-size="13"
        font-weight="600"
        fill="#7eb8ff">
    Upgrade: SharpOdinClient Pro (Odin 3.14.4)
  </text>

  <g transform="translate(900,140)">
    <rect x="0" y="0" width="100" height="36" rx="6"
          fill="#ffffff" fill-opacity="0.06"
          stroke="#ffffff" stroke-opacity="0.1"/>

    <text x="50" y="23"
          font-family="Segoe UI, sans-serif"
          font-size="13"
          font-weight="600"
          fill="#e8eaed"
          text-anchor="middle">
      C# / .NET
    </text>

    <rect x="0" y="48" width="100" height="36" rx="6"
          fill="#ffffff" fill-opacity="0.06"
          stroke="#ffffff" stroke-opacity="0.1"/>

    <text x="50" y="69"
          font-family="Segoe UI, sans-serif"
          font-size="13"
          font-weight="600"
          fill="#e8eaed"
          text-anchor="middle">
      Windows
    </text>

    <rect x="0" y="96" width="100" height="36" rx="6"
          fill="#ffffff" fill-opacity="0.06"
          stroke="#ffffff" stroke-opacity="0.1"/>

    <text x="50" y="117"
          font-family="Segoe UI, sans-serif"
          font-size="13"
          font-weight="600"
          fill="#e8eaed"
          text-anchor="middle">
      GPL-3.0
    </text>

    <rect x="120" y="0" width="140" height="36" rx="6"
          fill="url(#accent)"
          fill-opacity="0.2"
          stroke="#4a9eff"
          stroke-opacity="0.5"/>

    <text x="190" y="23"
          font-family="Segoe UI, sans-serif"
          font-size="12"
          font-weight="600"
          fill="#a8d4ff"
          text-anchor="middle">
      Download Mode
    </text>

    <rect x="120" y="48" width="140" height="36" rx="6"
          fill="#ffffff" fill-opacity="0.06"
          stroke="#ffffff" stroke-opacity="0.1"/>

    <text x="190" y="69"
          font-family="Segoe UI, sans-serif"
          font-size="12"
          font-weight="600"
          fill="#e8eaed"
          text-anchor="middle">
      Serial COM
    </text>

    <rect x="120" y="96" width="140" height="36" rx="6"
          fill="#ffffff" fill-opacity="0.06"
          stroke="#ffffff" stroke-opacity="0.1"/>

    <text x="190" y="117"
          font-family="Segoe UI, sans-serif"
          font-size="12"
          font-weight="600"
          fill="#e8eaed"
          text-anchor="middle">
      tar &#183; lz4 &#183; PIT
    </text>
  </g>

  <text x="200" y="370"
        font-family="Segoe UI, sans-serif"
        font-size="13"
        fill="#5c6370">
    GSM Alphabet &#183; alephgsm.com &#183; Open source &#183; Commercial Pro available
  </text>

  <rect x="0" y="397" width="1280" height="3" fill="url(#accent)" fill-opacity="0.6"/>
</svg>
